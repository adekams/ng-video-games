<div class="container">
  <ul class="slides">
    @for (item of images; track item?.image) {
      <li id="{{ $index }}">
        <img [src]="item?.image" alt="image" loading="lazy" decoding="async" />
      </li>
    }

    <li id="slide5"><img src="https://cdn.rawgit.com/huijing/filerepo/gh-pages/lw5.jpg" alt="" /></li> -->

  <ul class="thumbnails">
    @for (item of images; track item?.image) {
      <li>
        <a routerLink="./" [fragment]="$index"
          ><img alt="image" [src]="item?.image" loading="lazy" decoding="async"
        /></a>
      </li>
    }
